apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: claude-config-pvc
  namespace: claude-proxy
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: claude-workspace-pvc
  namespace: claude-proxy
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
